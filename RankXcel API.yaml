openapi: 3.0.3
info:
  title: RankXcel API
  version: 1.0.0
paths:
  /api/v1/admin/stats/:
    get:
      operationId: admin_stats_retrieve
      tags:
      - admin
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/ai-generate-questions/previous-year/:
    post:
      operationId: ai_generate_questions_previous_year_create
      description: POST — upload a previous year paper; subject/chapter auto-detected
        via LLM.
      tags:
      - ai-generate-questions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/ai-generate-questions/self-questions/:
    post:
      operationId: ai_generate_questions_self_questions_create
      description: POST — generate variants from existing DB question IDs; no file
        upload required.
      tags:
      - ai-generate-questions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessment-attempts/{attempt_id}/:
    get:
      operationId: assessment_attempts_retrieve
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessment-attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessment-attempts/{attempt_id}/detailed-analysis/:
    get:
      operationId: assessment_attempts_detailed_analysis_retrieve
      description: GET /api/v1/assessment-attempts/<attempt_id>/detailed-analysis/
        — detailed analysis with chapter, subject, and question breakdown.
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessment-attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessment-attempts/{attempt_id}/responses/:
    post:
      operationId: assessment_attempts_responses_create
      description: |-
        Save multiple answers for an in-progress attempt in a single request.

        Body: {"answers": [{"question_id": int, "selected_choice_ids": [...],
        "numeric_answer": ..., "is_marked_for_review": bool, "time_spent_seconds": int}, ...]}
        All answers are saved in a single transaction; if any item fails validation
        nothing is persisted and the per-item errors are returned.
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessment-attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessment-attempts/{attempt_id}/responses/{question_id}/:
    put:
      operationId: assessment_attempts_responses_update
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      - in: path
        name: question_id
        schema:
          type: integer
        required: true
      tags:
      - assessment-attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessment-attempts/{attempt_id}/result/:
    get:
      operationId: assessment_attempts_result_retrieve
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessment-attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessment-attempts/{attempt_id}/review/:
    get:
      operationId: assessment_attempts_review_retrieve
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessment-attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessment-attempts/{attempt_id}/start/:
    post:
      operationId: assessment_attempts_start_create
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessment-attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessment-attempts/{attempt_id}/submit/:
    post:
      operationId: assessment_attempts_submit_create
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessment-attempts
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessments/:
    get:
      operationId: assessments_list
      description: CRUD for Assessments — admin creates/edits, CR can list/retrieve.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssessmentListList'
          description: ''
    post:
      operationId: assessments_create
      description: CRUD for Assessments — admin creates/edits, CR can list/retrieve.
      tags:
      - assessments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssessmentCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssessmentCreate'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentCreate'
          description: ''
  /api/v1/assessments/{id}/:
    get:
      operationId: assessments_retrieve
      description: CRUD for Assessments — admin creates/edits, CR can list/retrieve.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this assessment.
        required: true
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentDetail'
          description: ''
    patch:
      operationId: assessments_partial_update
      description: CRUD for Assessments — admin creates/edits, CR can list/retrieve.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this assessment.
        required: true
      tags:
      - assessments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAssessmentPatch'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAssessmentPatch'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAssessmentPatch'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentPatch'
          description: ''
    delete:
      operationId: assessments_destroy
      description: CRUD for Assessments — admin creates/edits, CR can list/retrieve.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this assessment.
        required: true
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/assessments/{id}/deactivate/:
    post:
      operationId: assessments_deactivate_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessments/{id}/publish/:
    post:
      operationId: assessments_publish_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessments/{id}/questions/:
    get:
      operationId: assessments_questions_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: assessments_questions_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessments/{id}/questions/{question_id}/:
    delete:
      operationId: assessments_questions_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: question_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/assessments/csv-template/:
    get:
      operationId: assessments_csv_template_retrieve
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/assessments/db-selection/:
    post:
      operationId: assessments_db_selection_create
      description: |-
        POST /api/v1/assessments/db-selection/ — create an assessment from
        admin-selected question IDs (frontend wizard: pick questions on Screen 1,
        fill form on Screen 2, submit). question_count is derived from
        len(question_ids); the selected questions must be PUBLISHED and belong
        to the chosen exam.
      tags:
      - assessments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentDBSelection'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssessmentDBSelection'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssessmentDBSelection'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentDBSelection'
          description: ''
  /api/v1/assessments/import-csv/:
    post:
      operationId: assessments_import_csv_create
      description: |-
        Create an assessment by uploading a CSV of questions.

        Form fields (multipart): file, name, description, exam, question_count,
        total_duration_minutes, scheduled_at. Valid rows are imported in a
        single transaction; invalid rows are skipped and reported as warnings.
        Rows are capped at the form's question_count.
      tags:
      - assessments
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPassword'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMe'
          description: ''
    patch:
      operationId: auth_me_partial_update
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserMe'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserMe'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserMe'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMe'
          description: ''
  /api/v1/auth/password/reset/confirm/{uidb64}/{token}/:
    post:
      operationId: auth_password_reset_confirm_create
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      - in: path
        name: uidb64
        schema:
          type: string
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/v1/auth/resend-otp/:
    post:
      operationId: auth_resend_otp_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendOTP'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendOTP'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendOTP'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendOTP'
          description: ''
  /api/v1/auth/students/:
    get:
      operationId: auth_students_retrieve
      description: |-
        GET /api/v1/auth/students/ — paginated list of students with per-row
        aggregates (target exam, mocks count, avg score, last_login, status).
        Filters: ?status=, ?exam=<exam_id>, ?search=<name|email>.
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentListItem'
          description: ''
  /api/v1/auth/students/{id}/:
    get:
      operationId: auth_students_retrieve_2
      description: GET /api/v1/auth/students/<id>/ — full drill-in payload for one
        student.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDetail'
          description: ''
  /api/v1/auth/students/stats/:
    get:
      operationId: auth_students_stats_retrieve
      description: GET /api/v1/auth/students/stats/ — header counts for the dashboard.
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentStats'
          description: ''
  /api/v1/auth/users/:
    get:
      operationId: auth_users_list
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - ADMIN
          - CONTENT_REVIEWER
          - STUDENT
        description: |-
          * `STUDENT` - Student
          * `ADMIN` - Admin
          * `CONTENT_REVIEWER` - Content Reviewer
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserDetailList'
          description: ''
    post:
      operationId: auth_users_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminCreateUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminCreateUser'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateUser'
          description: ''
  /api/v1/auth/users/{id}/:
    get:
      operationId: auth_users_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
          description: ''
    patch:
      operationId: auth_users_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminUpdateUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminUpdateUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminUpdateUser'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUpdateUser'
          description: ''
  /api/v1/auth/users/{id}/activate/:
    post:
      operationId: auth_users_activate_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/users/{id}/suspend/:
    post:
      operationId: auth_users_suspend_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/users/accept-invite/{token}/:
    post:
      operationId: auth_users_accept_invite_create
      description: |-
        POST /api/v1/admin/users/accept-invite/<token>/ — invitee sets
        name + password to activate their account.
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInvite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AcceptInvite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AcceptInvite'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptInvite'
          description: ''
  /api/v1/auth/users/admins/{id}/:
    get:
      operationId: auth_users_admins_retrieve
      description: |-
        GET/PATCH /api/v1/admin/users/<id>/ — fetch profile; PATCH for the
        'Save Role' button. Restricted to admin/reviewer users (no students).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
          description: ''
    patch:
      operationId: auth_users_admins_partial_update
      description: |-
        GET/PATCH /api/v1/admin/users/<id>/ — fetch profile; PATCH for the
        'Save Role' button. Restricted to admin/reviewer users (no students).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminUpdateUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminUpdateUser'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminUpdateUser'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUpdateUser'
          description: ''
  /api/v1/auth/users/invite/:
    post:
      operationId: auth_users_invite_create
      description: |-
        POST /api/v1/admin/users/invite/ — invite a new admin/reviewer by
        email. Creates an inactive User and emails a signed token link that
        the invitee uses to set a password and activate.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteAdminUser'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InviteAdminUser'
