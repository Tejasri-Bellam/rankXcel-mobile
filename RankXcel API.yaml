  /api/v1/questions/ai-generate/batches/{batch_id}/questions/{index}/:
    patch:
      operationId: questions_ai_generate_batches_questions_partial_update
      description: |-
        PATCH /api/v1/questions/ai-generate/batches/<batch_id>/questions/<index>/

        Admin can edit a single question inside a staged batch before approving.
        Only the fields provided are updated; unspecified fields are unchanged.

        Editable fields:
          question_text, assertion_text, reason_text, difficulty, question_type
          choices: list of {text, is_correct, explanation}

        Example body:
          {
            "question_text": "Corrected question stem?",
            "choices": [
              {"text": "Option A", "is_correct": false, "explanation": ""},
              {"text": "Option B", "is_correct": true, "explanation": "Correct because ..."},
              {"text": "Option C", "is_correct": false, "explanation": ""},
              {"text": "Option D", "is_correct": false, "explanation": ""}
            ]
          }
      parameters:
      - in: path
        name: batch_id
        schema:
          type: string
        required: true
      - in: path
        name: index
        schema:
          type: integer
        required: true
      tags:
      - questions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/questions/ai-generate/batches/{batch_id}/review/:
    post:
      operationId: questions_ai_generate_batches_review_create
      description: |-
        POST /api/v1/questions/ai-generate/batches/<batch_id>/review/

        Admin selects which questions to publish. Only approved questions are written to DB.
        Rejected/unselected questions are discarded. Batch is deleted after review.

        Body (JSON):
          { "approve_all": true }
          OR
          { "approve_indices": [0, 1, 3] }
      parameters:
      - in: path
        name: batch_id
        schema:
          type: string
        required: true
      tags:
      - questions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
